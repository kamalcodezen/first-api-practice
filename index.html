<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API</title>

    <style>
        #post-container {
            max-width: 72rem;
            margin: 10px auto;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            row-gap: 30px;
        }

        .post-card {
            border: 1px solid green;
            border-radius: 10px;
            box-shadow: 1px 1px 1px green;
            background: #ddd;
            padding: 10px;
            height: 100%;
               box-shadow:
                0 0 10px #ff005e,
                0 0 20px #ff005e,
                0 0 30px #00d4ff;
        }

        .post-card p {
            text-align: justify;
        }
    </style>

</head>

<body>
    <button onclick="loadData()">Load Data</button>

    <button onclick="checkData()">Check Data</button>

    <button onclick="postData()">Post Data</button>

    <h1 style="text-align: center">All Post</h1>

    <div id="post-container">

        </div>


        <script src="javaScript/script.js"></script>
        <script src="./javaScript/posts.js"></script>
</body>

</html>
